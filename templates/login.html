{% extends "base.html" %}

{% block title %}Login - FraudGuard AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5">
    <div class="card border-0 shadow-lg p-4" data-aos="zoom-in">
      <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-block rounded-circle p-3 mb-3">
          <i class="fas fa-shield-alt fa-2x"></i>
        </div>
        <h3 class="fw-bold">Welcome Back</h3>
        <p class="text-muted">Sign in to the FraudGuard AI Platform</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label text-light fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-primary">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required placeholder="admin@bank.com">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-light fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-primary">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">
          <i class="fas fa-sign-in-alt me-2"></i>Secure Login
        </button>
      </form>

      <div class="text-center mt-4 pt-3 border-top border-secondary">
        <p class="text-muted small"><i class="fas fa-info-circle me-1"></i>Use your administrator credentials to sign in.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
